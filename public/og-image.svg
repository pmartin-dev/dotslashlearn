<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0c0c0e"/>
  <!-- subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand title: ./learn -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="600" y="280" text-anchor="middle" font-size="180" font-weight="700">
      <tspan fill="#3b82f6">.</tspan><tspan fill="#3b82f6">/</tspan><tspan fill="#f5f5f5" font-weight="300">learn</tspan>
    </text>
    <text x="600" y="370" text-anchor="middle" font-size="32" fill="#a1a1aa">
      Interactive dev lessons
    </text>
    <text x="600" y="500" text-anchor="middle" font-size="22" fill="#52525b" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      step-by-step  ·  live code  ·  quizzes
    </text>
  </g>
</svg>
